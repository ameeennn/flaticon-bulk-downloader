<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaticon Forced Bulk Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 1);
        }

        .loader-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-enter {
            animation: fadeInScale 0.3s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <div class="max-w-5xl mx-auto p-6 md:p-12">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Icon Force-Downloader</h1>
            <p class="text-slate-600 max-w-2xl mx-auto text-lg">
                Paste Flaticon CDN URLs. We will convert them to local blobs to 
                <span class="text-blue-600 font-bold">force download</span> all sizes (16px to 512px) without redirects.
            </p>
        </header>

        <main class="glass-morphism rounded-3xl shadow-2xl overflow-hidden mb-10">
            <div class="p-8 space-y-6">
                <div>
                    <label for="urlList" class="block text-sm font-bold text-slate-700 mb-3">Paste Image URLs (One per line)</label>
                    <textarea id="urlList" rows="6" 
                        class="w-full p-5 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all font-mono text-sm leading-relaxed"
                        placeholder="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">https://cdn-icons-png.flaticon.com/64/1384/1384060.png</textarea>
                </div>

                <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                    <div class="flex items-center gap-3 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                        <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                        <span class="text-xs font-bold text-blue-700 uppercase tracking-widest">7 Sizes Auto-Generated</span>
                    </div>
                    
                    <button onclick="processAll()" id="btnProcess"
                        class="w-full md:w-auto bg-slate-900 hover:bg-black text-white font-bold py-4 px-12 rounded-2xl transition-all shadow-xl active:scale-95 flex items-center justify-center gap-3">
                        <span>Process All Icons</span>
                    </button>
                </div>
            </div>
        </main>

        <div id="resultsArea" class="hidden space-y-8">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800">Download Manager</h2>
                    <p id="statsLabel" class="text-slate-500 font-medium">Ready to convert icons.</p>
                </div>
                <button onclick="downloadAll()" id="btnDownloadAll"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-2xl transition-all flex items-center gap-3 shadow-lg hover:shadow-emerald-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download Everything Now
                </button>
            </div>
            
            <div id="downloadGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Icon Group Cards will be injected here -->
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl transform translate-y-32 transition-transform duration-500 font-semibold z-50 text-center min-w-[300px]">
        Message goes here
    </div>

    <script>
        const SIZES = [16, 24, 32, 64, 128, 256, 512];
        const urlListInput = document.getElementById('urlList');
        const downloadGrid = document.getElementById('downloadGrid');
        const resultsArea = document.getElementById('resultsArea');
        const toast = document.getElementById('toast');
        const statsLabel = document.getElementById('statsLabel');

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }

        async function processAll() {
            const rawText = urlListInput.value.trim();
            if (!rawText) {
                showToast("Please enter at least one Flaticon URL.");
                return;
            }

            const urls = rawText.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            downloadGrid.innerHTML = '';
            resultsArea.classList.remove('hidden');
            
            let iconCount = 0;

            for (const originalUrl of urls) {
                const flaticonRegex = /^(https:\/\/cdn-icons-png\.flaticon\.com\/)\d+\/(.+)$/i;
                const match = originalUrl.match(flaticonRegex);

                if (!match) {
                    createErrorCard(originalUrl);
                    continue;
                }

                iconCount++;
                const prefix = match[1];
                const suffix = match[2];
                const iconId = suffix.split('/').pop().replace('.png', '');

                const groupCard = createGroupCard(iconId, originalUrl, prefix, suffix);
                downloadGrid.appendChild(groupCard);
            }

            statsLabel.innerText = `${iconCount} icons identified. Generating local download blobs...`;
            resultsArea.scrollIntoView({ behavior: 'smooth' });
        }

        function createGroupCard(id, url, prefix, suffix) {
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-3xl border border-slate-200 shadow-sm card-enter";
            
            let gridHtml = '';
            SIZES.forEach(size => {
                const targetUrl = `${prefix}${size}/${suffix}`;
                gridHtml += `
                    <div id="item-${id}-${size}" class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 group transition-all">
                        <div class="flex items-center gap-3">
                            <span class="w-10 text-[10px] font-black text-slate-400">${size}PX</span>
                            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center p-1 border border-slate-100 overflow-hidden">
                                <img src="${targetUrl}" class="max-w-full max-h-full" onerror="this.src='https://placehold.co/32?text=X'">
                            </div>
                        </div>
                        <button onclick="forceDownload('${targetUrl}', 'icon_${id}_${size}px.png', this)" 
                                class="btn-single-download text-blue-600 hover:bg-blue-600 hover:text-white px-3 py-1 rounded-lg text-[10px] font-bold transition-all border border-blue-100">
                            GENERATE & DOWNLOAD
                        </button>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="flex items-center gap-4 mb-6 pb-4 border-b border-slate-50">
                    <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg overflow-hidden">
                        <img src="${prefix}128/${suffix}" class="w-10 h-10 object-contain">
                    </div>
                    <div class="overflow-hidden">
                        <h3 class="font-extrabold text-slate-900 truncate">Icon ID: ${id}</h3>
                        <p class="text-[10px] text-slate-400 font-mono truncate">${url}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    ${gridHtml}
                </div>
            `;
            return card;
        }

        async function forceDownload(url, filename, buttonEl) {
            const originalText = buttonEl.innerText;
            buttonEl.disabled = true;
            buttonEl.innerHTML = `
                <svg class="loader-spin h-3 w-3 inline mr-1" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                LOADING...
            `;

            try {
                // Step 1: Create Image Object
                const img = new Image();
                img.crossOrigin = "anonymous"; // CRITICAL for CORS
                
                const dataUrl = await new Promise((resolve, reject) => {
                    img.onload = () => {
                        // Step 2: Draw to internal canvas
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        
                        // Step 3: Convert to data URL (Forces local origin)
                        try {
                            resolve(canvas.toDataURL('image/png'));
                        } catch (e) {
                            reject(new Error("CORS Security Blocked Conversion"));
                        }
                    };
                    img.onerror = () => reject(new Error("Network Error"));
                    img.src = url;
                });

                // Step 4: Create invisible link and click it
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                buttonEl.innerHTML = "✓ DOWNLOADED";
                buttonEl.classList.replace('text-blue-600', 'text-emerald-600');
                buttonEl.classList.replace('border-blue-100', 'border-emerald-100');
                
            } catch (err) {
                console.error(err);
                buttonEl.innerHTML = "FAILED (CORS)";
                buttonEl.classList.replace('text-blue-600', 'text-red-600');
                showToast("Note: Flaticon might be blocking forced downloads for this specific asset.");
            } finally {
                buttonEl.disabled = false;
            }
        }

        async function downloadAll() {
            const buttons = document.querySelectorAll('.btn-single-download');
            if (buttons.length === 0) return;

            const batchBtn = document.getElementById('btnDownloadAll');
            batchBtn.disabled = true;
            batchBtn.classList.add('opacity-50');
            
            showToast(`Generating ${buttons.length} forced downloads...`);

            // We process them one by one to avoid crashing the browser memory with data URLs
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].click();
                // Staggered delay to help the browser handle multiple file saves
                await new Promise(r => setTimeout(r, 300));
            }

            batchBtn.disabled = false;
            batchBtn.classList.remove('opacity-50');
            showToast("All tasks triggered!");
        }

        function createErrorCard(url) {
            const err = document.createElement('div');
            err.className = "bg-red-50 p-6 rounded-3xl border border-red-100 flex items-center gap-4 card-enter";
            err.innerHTML = `
                <div class="bg-red-100 p-3 rounded-xl text-red-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <div class="overflow-hidden">
                    <p class="font-black text-red-800 text-xs tracking-widest uppercase">Invalid URL Format</p>
                    <p class="text-[10px] text-red-500 truncate font-mono">${url}</p>
                </div>
            `;
            downloadGrid.appendChild(err);
        }
    </script>
</body>
</html>
